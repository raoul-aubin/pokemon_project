@if (pokemon) {
  <div class="col-8 offset-2">  
    <div class="card px-4 py-4">   
      
      <form (ngSubmit)="onSubmit()" #pokemonForm="ngForm">
     
          <!-- Pokemon name --> 
          <div class="mb-3"> 
            <label for="name">Nom</label> 
            <input type="text" class="form-control" id="name" 
                    required 
                    pattern="^[a-zA-Z0-9àéèç]{1,25}$" 
                   [(ngModel)]="pokemon.name" name="name" 
                   #name="ngModel"> 
     
            <div [hidden]="name.valid || name.pristine" 
                  class="card bg-danger text-white"> 
                  Le nom du pokémon est requis (1-25). 
            </div> 
          </div> 

          <!-- Pokemon picture --> 
          @if (isAddForm) {
            <div class="mb-3"> 
              <label for="picture">Image</label> 
              <input type="url" class="form-control" id="picture" 
                      required 
                     [(ngModel)]="pokemon.picture" name="picture" 
                     #picture="ngModel"> 
       
              <div [hidden]="picture.valid || picture.pristine" 
                    class="card bg-danger text-white"> 
                    L'Image du pokémon est requis (1-25). 
              </div> 
            </div> 
          }
     
          <!-- Pokemon hp --> 
          <div class="mb-3"> 
            <label for="hp">Point de vie</label> 
            <input type="number" class="form-control" id="hp" 
                    required 
                    pattern="^[0-9]{1,3}$" 
                   [(ngModel)]="pokemon.hp" name="hp" 
                   #hp="ngModel"> 
             <div [hidden]="hp.valid || hp.pristine" 
                   class="card bg-danger text-white"> 
                   Les points de vie du pokémon sont compris entre 0 et 999. 
             </div> 
          </div> 
     
          <!-- Pokemon cp --> 
          <div class="mb-3"> 
            <label for="cp">Dégâts</label> 
            <input type="number" class="form-control" id="cp" 
                    required 
                    pattern="^[0-9]{1,2}$" 
                   [(ngModel)]="pokemon.cp" name="cp" 
                   #cp="ngModel"> 
             <div [hidden]="cp.valid || cp.pristine" 
                   class="card bg-danger text-white"> 
                   Les dégâts du pokémon sont compris entre 0 et 99. 
             </div> 
          </div> 
     
          <!-- Pokemon types --> 
          <div> 
            <label for="types">Types</label>
            @for (type of types; track $index) {
              <div class="mb-2"> 
                <div class="form-check"> 
                  <input type="checkbox" 
                    class="form-check-input" 
                    id="{{ type }}" 
                    [value]="type" 
                    [checked]="hasType(type)" 
                    [disabled]="!isTypesValid(type)" 
                    (change)="selectType($event, type)"/> 
                  <label class="form-check-label" for="{{ type }}"> 
                    <div class="{{ type | pokemonTypeColor }}"> 
                      {{ type }} 
                    </div> 
                  </label> 
                </div> 
              </div> 
            } 
          </div> 
     
          <!-- Submit button --> 
          <div class="section text-center"> 
            <button type="submit" 
              class="btn btn-primary" 
              [disabled]="!pokemonForm.form.valid"> 
              Valider</button> 
          </div> 
     
      </form>  
    </div>
  </div>
  @if (!pokemon) {
    <h3 class="text-center">
      <app-loader></app-loader>
    </h3>
  }
  

}
