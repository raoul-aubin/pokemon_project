@if (user$ | async; as user) {
  <div class="container" style="max-width: 720px;">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title mb-3">Mein Konto</h4>

        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Benutzername</label>
            <input
              class="form-control"
              [(ngModel)]="user.username"
              name="username">
          </div>

          <div class="col-12">
            <label class="form-label">E-Mail</label>
            <input
              class="form-control"
              [(ngModel)]="user.email"
              name="email">
          </div>

          <div class="col-12">
            <label class="form-label">Passwort</label>
            <input class="form-control" type="password" value="********" disabled>
            <div class="form-text">
              (Passwort wird aus Sicherheitsgründen nicht angezeigt.)
            </div>
          </div>
        </div>

        <hr class="my-4">

        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" (click)="updateUser(user)">
            Bearbeiten
          </button>

          <button class="btn btn-danger ms-auto" (click)="deleteUser()">
            Konto löschen
          </button>
        </div>

        <div class="mt-3">
          <a routerLink="/change-password" class="btn btn-outline-primary">
            Passwort ändern
          </a>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="container" style="max-width: 720px;">
    <div class="card">
      <div class="card-body">
        <p class="mb-0">Wird geladen...</p>
      </div>
    </div>
  </div>
}
